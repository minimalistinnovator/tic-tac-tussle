version: "3.9"

services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: ttt-redpanda
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --overprovisioned
      - --node-id=0
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr=internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr=internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr=internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --advertise-schema-registry-addr=internal://redpanda:8081,external://localhost:18081
      - --set=auto_create_topics_enabled=true
    ports:
      - "19092:19092"
      - "18081:18081"
      - "18082:18082"
      - "9644:9644"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: [ "CMD", "rpk", "cluster", "health" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped
    networks:
      - ttt_net

  console:
    image: docker.redpanda.com/redpandadata/console:latest
    container_name: ttt-console
    ports:
      - "8080:8080"
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
      CONSOLE_CONFIG_FILE: |
        kafka:
          brokers: ["redpanda:9092"]
        schemaRegistry:
          enabled: true
          urls: ["http://redpanda:8081"]
        redpanda:
          adminApi:
            enabled: true
            urls: ["http://redpanda:9644"]
    depends_on:
      redpanda:
        condition: service_healthy
    networks:
      - ttt_net

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: ttt-server
    environment:
      KAFKA_BROKERS: "redpanda:9092"
      RUST_LOG: "server=trace,store=debug,rdkafka=warn"
    ports:
      - "5000:5000/udp"
    depends_on:
      redpanda:
        condition: service_healthy
    networks:
      - ttt_net
    restart: unless-stopped

volumes:
  redpanda_data:

networks:
  ttt_net:
    driver: bridge
